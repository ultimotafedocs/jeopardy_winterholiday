<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winter Holiday Jeopardy</title>
<style>
  /* ── Design tokens ── */
  :root {
    --navy:       #0A1628;
    --navy-mid:   #122040;
    --navy-light: #1B3260;
    --gold:       #F5C518;
    --gold-light: #FDE97A;
    --gold-pale:  #FFF8D6;
    --white:      #FFFFFF;
    --silver:     #C8D6E8;
    --green:      #1A6B3A;
    --green-bg:   #D4EDDA;
    --red:        #8B1A1A;
    --red-bg:     #FDDEDE;
    --shadow:     0 4px 20px rgba(0,0,0,0.45);
    --radius:     10px;
    --radius-lg:  16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Trebuchet MS', 'Segoe UI', Arial, sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* ── Page shell ── */
  .page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }

  .game-title {
    text-align: center;
    font-size: clamp(22px, 4vw, 40px);
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--gold);
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    margin-bottom: 6px;
  }
  .game-subtitle {
    text-align: center;
    font-size: clamp(13px, 2vw, 18px);
    color: var(--silver);
    margin-bottom: 28px;
    letter-spacing: 0.04em;
  }

  /* ── Setup screen ── */
  .setup-card {
    background: var(--navy-mid);
    border: 2px solid var(--gold);
    border-radius: var(--radius-lg);
    max-width: 520px;
    margin: 0 auto;
    padding: 36px 40px;
    box-shadow: var(--shadow);
  }
  .setup-heading {
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 24px;
    text-align: center;
  }
  .team-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
  }
  .t-badge {
    font-size: clamp(12px, 1.5vw, 14px);
    font-weight: 700;
    padding: 6px 12px;
    border-radius: 6px;
    white-space: nowrap;
    min-width: 90px;
    text-align: center;
  }
  .t1 { background: #1B3260; color: var(--gold); border: 1px solid var(--gold); }
  .t2 { background: #1A6B3A; color: #A8F0C0; border: 1px solid #A8F0C0; }
  .t3 { background: #7A3B00; color: #FFD580; border: 1px solid #FFD580; }
  .t4 { background: #4A1A6B; color: #D4A8F0; border: 1px solid #D4A8F0; }

  .team-row input {
    flex: 1;
    font-size: clamp(14px, 2vw, 16px);
    padding: 10px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--navy-light);
    background: var(--navy);
    color: var(--white);
    outline: none;
    transition: border-color 0.15s;
  }
  .team-row input:focus { border-color: var(--gold); }
  .team-row input::placeholder { color: #5A7090; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 12px 22px;
    font-size: clamp(14px, 2vw, 17px);
    font-weight: 700;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: transform 0.1s, box-shadow 0.1s;
    user-select: none;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:active { transform: scale(0.97); }

  .btn-gold {
    background: var(--gold);
    color: var(--navy);
    box-shadow: 0 3px 12px rgba(245,197,24,0.4);
  }
  .btn-gold:hover { background: var(--gold-light); box-shadow: 0 5px 16px rgba(245,197,24,0.55); }

  .btn-outline {
    background: transparent;
    color: var(--silver);
    border: 1.5px solid var(--navy-light);
  }
  .btn-outline:hover { border-color: var(--silver); color: var(--white); }

  .btn-correct {
    background: var(--green-bg);
    color: var(--green);
    border: 1.5px solid var(--green);
  }
  .btn-correct:hover { background: #b8dfc6; }

  .btn-wrong {
    background: var(--red-bg);
    color: var(--red);
    border: 1.5px solid var(--red);
  }
  .btn-wrong:hover { background: #f5c0c0; }

  .btn-hint {
    background: var(--navy-light);
    color: var(--gold-light);
    border: 1.5px solid var(--gold);
  }
  .btn-hint:hover { background: #223870; }

  .start-wrap { text-align: center; margin-top: 24px; }

  /* ── Scoreboard ── */
  .scoreboard {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .score-card {
    flex: 1; min-width: 130px;
    background: var(--navy-mid);
    border: 2px solid var(--navy-light);
    border-radius: var(--radius);
    padding: 10px 16px;
    display: flex; flex-direction: column; gap: 3px;
    transition: border-color 0.2s;
  }
  .score-card.active {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(245,197,24,0.15);
  }
  .score-label {
    font-size: clamp(11px, 1.5vw, 13px);
    color: var(--silver);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .score-val {
    font-size: clamp(22px, 3.5vw, 32px);
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
  }

  .turn-bar {
    text-align: center;
    font-size: clamp(14px, 2vw, 18px);
    color: var(--silver);
    margin-bottom: 16px;
  }
  .turn-bar strong { color: var(--gold); }

  /* ── Board grid ── */
  .board-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 8px;
  }

  .cat-header {
    color: var(--gold-light);
    font-size: clamp(11px, 1.4vw, 14px);
    font-weight: 800;
    text-align: center;
    padding: 12px 6px;
    border-radius: var(--radius);
    line-height: 1.3;
    min-height: 64px;
    display: flex; align-items: center; justify-content: center;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    border-bottom: 3px solid rgba(245,197,24,0.5);
  }

  .q-cell {
    color: var(--gold);
    font-size: clamp(18px, 3vw, 32px);
    font-weight: 800;
    text-align: center;
    padding: 12px 4px;
    border-radius: var(--radius);
    min-height: 64px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.12s, transform 0.1s, box-shadow 0.12s;
    user-select: none;
    letter-spacing: 0.02em;
    border: 2px solid rgba(255,255,255,0.08);
    text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  .q-cell:hover {
    box-shadow: 0 0 0 3px var(--gold), inset 0 0 20px rgba(245,197,24,0.15);
    transform: scale(1.03);
  }
  .q-cell:active { transform: scale(0.97); }
  .q-cell.used {
    background: #0D1D36 !important;
    color: #2A3D58;
    cursor: default;
    border-color: transparent;
    font-size: clamp(18px, 2.5vw, 26px);
  }
  .q-cell.used:hover { transform: none; box-shadow: none; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.72);
    z-index: 200;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal-box {
    background: var(--navy-mid);
    border: 2px solid var(--gold);
    border-radius: var(--radius-lg);
    padding: 32px 36px 28px;
    max-width: 680px; width: 100%;
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    animation: pop 0.15s ease-out;
  }
  @keyframes pop {
    from { transform: scale(0.94); opacity: 0.5; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .modal-close {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none; color: var(--silver);
    font-size: 26px; cursor: pointer; line-height: 1;
    padding: 2px 6px; border-radius: 4px;
    transition: color 0.1s;
  }
  .modal-close:hover { color: var(--white); }

  .modal-pts {
    font-size: clamp(13px, 1.8vw, 15px);
    color: var(--silver);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .modal-cat {
    font-size: clamp(12px, 1.6vw, 14px);
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 700;
    margin-bottom: 18px;
  }
  .modal-q {
    font-size: clamp(18px, 2.8vw, 26px);
    font-weight: 700;
    color: var(--white);
    line-height: 1.45;
    margin-bottom: 22px;
  }
  .modal-hint {
    background: rgba(27,50,96,0.7);
    border-left: 4px solid var(--gold);
    border-radius: 6px;
    padding: 12px 16px;
    font-size: clamp(14px, 1.8vw, 16px);
    color: var(--gold-light);
    font-style: italic;
    margin-bottom: 18px;
    display: none;
    line-height: 1.45;
  }
  .modal-answer {
    background: var(--green-bg);
    border: 1.5px solid var(--green);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: clamp(16px, 2.2vw, 20px);
    color: var(--green);
    font-weight: 700;
    display: none;
    margin-bottom: 20px;
    line-height: 1.4;
  }
  .modal-btns {
    display: flex; gap: 10px; flex-wrap: wrap;
  }

  /* ── End screen ── */
  .end-screen {
    display: none;
    text-align: center;
    padding: 40px 20px;
  }
  .end-screen.show { display: block; }
  .end-title {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .end-sub {
    font-size: clamp(14px, 2vw, 20px);
    color: var(--silver);
    margin-bottom: 32px;
  }
  .final-scores {
    display: flex; gap: 16px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 32px;
  }
  .final-card {
    background: var(--navy-mid);
    border: 2px solid var(--navy-light);
    border-radius: var(--radius-lg);
    padding: 20px 28px;
    min-width: 140px;
    transition: border-color 0.2s;
  }
  .final-card.winner {
    border-color: var(--gold);
    box-shadow: 0 0 0 4px rgba(245,197,24,0.2);
  }
  .fc-crown { font-size: 30px; margin-bottom: 6px; }
  .fc-name {
    font-size: clamp(13px, 1.8vw, 16px);
    color: var(--silver);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }
  .fc-score {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 800;
    color: var(--gold);
  }
  .final-card:not(.winner) .fc-score { color: var(--silver); }
</style>
</head>
<body>

<div class="page">

  <div class="game-title">Winter Holiday Jeopardy</div>
  <div class="game-subtitle">Australian English &amp; Idioms Review</div>

  <!-- ── Setup screen ── -->
  <div id="setup">
    <div class="setup-card">
      <div class="setup-heading">Set up teams</div>
      <div class="team-row">
        <span class="t-badge t1">Team 1</span>
        <input id="t1" value="Team 1" maxlength="20" autocomplete="off">
      </div>
      <div class="team-row">
        <span class="t-badge t2">Team 2</span>
        <input id="t2" value="Team 2" maxlength="20" autocomplete="off">
      </div>
      <div class="team-row">
        <span class="t-badge t3">Team 3</span>
        <input id="t3" placeholder="Optional - leave blank to skip" maxlength="20" autocomplete="off">
      </div>
      <div class="team-row">
        <span class="t-badge t4">Team 4</span>
        <input id="t4" placeholder="Optional - leave blank to skip" maxlength="20" autocomplete="off">
      </div>
      <div class="start-wrap">
        <button class="btn btn-gold" onclick="startGame()">Start Game</button>
      </div>
    </div>
  </div>

  <!-- ── Game board ── -->
  <div id="game" style="display:none">
    <div class="scoreboard" id="scoreboard"></div>
    <div class="turn-bar">Current turn: <strong id="turn-name"></strong></div>
    <div class="board-grid" id="board"></div>
  </div>

  <!-- ── End screen ── -->
  <div class="end-screen" id="endscreen">
    <div class="end-title">Game Over!</div>
    <div class="end-sub">Final Scores</div>
    <div class="final-scores" id="final-scores"></div>
    <button class="btn btn-gold" onclick="resetGame()">Play Again</button>
  </div>

</div><!-- /page -->

<!-- ── Question modal ── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
    <div class="modal-pts" id="m-pts"></div>
    <div class="modal-cat" id="m-cat"></div>
    <div class="modal-q" id="m-q"></div>
    <div class="modal-hint" id="m-hint"></div>
    <div class="modal-answer" id="m-ans"></div>
    <div class="modal-btns" id="m-btns"></div>
  </div>
</div>

<script>
// ── Category colours (board cell backgrounds) ──
const CAT_COLORS = [
  { cell: '#103A7A', hover: '#0A2A5C' },
  { cell: '#115030', hover: '#0A3820' },
  { cell: '#5C2E00', hover: '#3F1F00' },
  { cell: '#4A2680', hover: '#331A5C' },
  { cell: '#7A1818', hover: '#561010' },
];

const CATS = [
  {
    name: "What does it mean?",
    qs: [
      { q: "This expression means 'exactly right or accurate'. Marco uses it twice in the conversation.", a: "Spot on", pts: 100, hint: "Priya says 'Exactly.' Marco then uses this expression to agree with her later." },
      { q: "This expression describes something intense, very busy, or overwhelming. Both Priya and Marco use it to describe the term.", a: "Full-on", pts: 200, hint: "Marco says this term has been _______ -- and Priya agrees." },
      { q: "This expression means to become nervous and want to back out of something before you do it.", a: "Get cold feet", pts: 300, hint: "Marco asks Priya: 'Did anyone _______ and pull out?' before the talent night." },
      { q: "This expression means to sing or perform loudly and confidently.", a: "Belt it out", pts: 400, hint: "Priya says one bloke from class is going to _______ on stage." },
      { q: "This phrase means to make every possible effort -- to go all out for something.", a: "Pull out all the stops", pts: 500, hint: "Sandra did this with the decorations for the talent night." },
      { q: "This expression means to give something a try -- to attempt it even if you're not sure.", a: "Have a crack", pts: 600, hint: "Marco asks Priya: 'Are you going to _______ at anything?' She says no way." },
      { q: "This expression means something feels more meaningful or special in a particular moment or context.", a: "Hits different", pts: 700, hint: "Marco says the end-of-term send-off _______ -- like a little farewell." },
      { q: "This expression means to warn or inform someone in advance so they are prepared.", a: "Give someone the heads-up", pts: 800, hint: "Marco asks Priya who gave her the _______ about the talent night." },
      { q: "This Australian slang word means a person who talks too much.", a: "Gasbag", pts: 900, hint: "Marco says he doesn't want to be a _______ when he brings up studying over the break." },
      { q: "This expression means to be completely informed about something -- to know it thoroughly.", a: "Fully across", pts: 1000, hint: "Priya says Sandra is _______ the whole talent night program." },
    ]
  },
  {
    name: "Use it in context",
    qs: [
      { q: "Fill the gap: 'Not gonna lie, I'm _______ relieved. This term has been full-on.'", a: "Flat out", pts: 100, hint: "It means extremely or completely -- used as an intensifier here." },
      { q: "Fill the gap: 'Break _______ to everyone performing this arvo!'", a: "A leg", pts: 200, hint: "It means good luck -- especially before a performance." },
      { q: "Fill the gap: 'The house is going to be _______ with rellos this break.'", a: "Chockers", pts: 300, hint: "It means completely packed or full." },
      { q: "Fill the gap: 'I had _______ in my stomach all day -- I'd never go on stage.'", a: "Butterflies", pts: 400, hint: "It describes a nervous feeling before something important." },
      { q: "Fill the gap: 'I reckon he'll _______ it out of the park. Those types always do.'", a: "Knock", pts: 500, hint: "This expression means to do something extremely well." },
      { q: "Fill the gap: 'She'll probably _______ about the traffic the whole drive.'", a: "Whinge", pts: 600, hint: "It means to complain persistently." },
      { q: "Fill the gap: 'I'm _______ excited to just veg out for a few days.'", a: "Heaps", pts: 700, hint: "Australian informal for 'a lot' or 'very'." },
      { q: "Fill the gap: 'I'm going to be a _______ more organised this break. Maybe one hour of study a day.'", a: "Smidge", pts: 800, hint: "It means a very small amount." },
      { q: "Fill the gap: 'If a study group _______, give me the heads-up.'", a: "Pops up", pts: 900, hint: "The full expression is 'if anything _______' -- meaning if something comes up." },
      { q: "Fill the gap: 'She never _______ around the bush. She just gets things done.'", a: "Beats", pts: 1000, hint: "It means to avoid getting to the point -- Sandra does the opposite of this." },
    ]
  },
  {
    name: "Who said it?",
    qs: [
      { q: "Who said: 'Holy moly, three weeks! Not gonna lie, I'm flat out relieved.'", a: "Marco", pts: 100, hint: "He says this right at the start when Priya asks about his plans." },
      { q: "Who said they were 'heaps excited to just veg out for a few days'?", a: "Priya", pts: 200, hint: "She says this after Marco admits he's relieved the term is over." },
      { q: "Who told the other about the talent night in the arvo?", a: "Priya", pts: 300, hint: "She heard about it from Sandra." },
      { q: "Who said: 'I'd have butterflies in my stomach all day' about performing on stage?", a: "Marco", pts: 400, hint: "He said it in response to hearing about the bloke who's going to belt it out." },
      { q: "Who said: 'Those types always hit the right note because they're relaxed about it'?", a: "Marco", pts: 500, hint: "He said this after predicting the performer would knock it out of the park." },
      { q: "Who said: 'Ha! No way. I don't want to fall flat in front of everyone.'?", a: "Priya", pts: 600, hint: "Marco had just asked if she was going to have a crack at performing." },
      { q: "Who is planning to take the kids to the Blue Mountains during the break?", a: "Priya", pts: 700, hint: "She says it'll be proper cold up there but she vibes with it." },
      { q: "Who suggested studying one hour a day over the break -- and said 'No whingeing about it, just do it'?", a: "Priya", pts: 800, hint: "Marco said he didn't want to be a gasbag about it, but she answered first." },
      { q: "Who said: 'Sounds like a plan! Right, I'd better get moving.'?", a: "Priya", pts: 900, hint: "She said this just before wishing everyone break a leg for the arvo." },
      { q: "Who said they'd bring a prezzy for Sandra as a thank you?", a: "Marco", pts: 1000, hint: "He said this after calling the end-of-term send-off something that 'hits different'." },
    ]
  },
  {
    name: "Aussie slang",
    qs: [
      { q: "What is an 'esky'?", a: "A portable cooler or icebox for drinks and food", pts: 100, hint: "Marco says Sandra packed one -- and calls it very nifty." },
      { q: "What does 'arvo' mean?", a: "Afternoon", pts: 200, hint: "Priya says: 'Break a leg to everyone performing this _______!'" },
      { q: "What does 'rellos' mean?", a: "Relatives or family members", pts: 300, hint: "Both Priya and Marco mention their rellos coming to stay over the break." },
      { q: "What does 'devo' mean?", a: "Devastated -- very disappointed", pts: 400, hint: "One girl who pulled out of performing felt this way." },
      { q: "What does it mean if someone is a 'sook'?", a: "A person who complains a lot or cries easily", pts: 500, hint: "Priya calls her sister a total _______ because she whinges about traffic." },
      { q: "What is a 'ute' in Australian English?", a: "A utility vehicle -- a pickup truck", pts: 600, hint: "Priya's sister drives one all the way from Wollongong." },
      { q: "What does 'good onya' mean?", a: "Well done; good on you -- a way of praising someone", pts: 700, hint: "Marco says this about Priya's plan to take the kids to the Blue Mountains." },
      { q: "What does it mean to 'dob someone in'?", a: "To report someone or get them in trouble", pts: 800, hint: "Priya jokingly says: 'Don't let anyone _______ you _______ for enjoying the break!'" },
      { q: "What does 'on-brand' mean?", a: "Typical or expected behaviour for a particular person", pts: 900, hint: "Marco says the end-of-term quiet is _______ for everyone. Priya says her sister whinges -- that's _______ for her." },
      { q: "What is a 'larrikin'?", a: "A fun-loving, cheeky person who doesn't take things too seriously", pts: 1000, hint: "Priya says the performer is a real _______ -- so he'll probably just laugh if he falls flat." },
    ]
  },
  {
    name: "True or false?",
    qs: [
      { q: "TRUE or FALSE: Marco says he is going to perform at the talent night.", a: "FALSE -- Marco says he'll just watch and eat.", pts: 100, hint: "He mentions Sandra packed an esky with drinks. Very nifty." },
      { q: "TRUE or FALSE: Priya's sister is driving up from Wollongong in a ute.", a: "TRUE -- Priya says exactly this.", pts: 200, hint: "Priya also says her sister will probably whinge about the traffic the whole time." },
      { q: "TRUE or FALSE: Sandra organised the talent night and pulled out all the stops with the decorations.", a: "TRUE -- Priya confirms both of these.", pts: 300, hint: "Priya says it's going to go off." },
      { q: "TRUE or FALSE: 'Beat around the bush' means to say something very directly and clearly.", a: "FALSE -- It means to avoid saying something directly.", pts: 400, hint: "Priya says Sandra never does this -- she just gets things done." },
      { q: "TRUE or FALSE: 'A fair go' means giving someone an unfair advantage over others.", a: "FALSE -- It means a reasonable chance or opportunity for everyone.", pts: 500, hint: "Priya uses this expression when a girl pulls out of performing. She says it's her right." },
      { q: "TRUE or FALSE: 'Going off' is negative in Australian slang -- it means something is going wrong.", a: "FALSE -- In Australian slang, 'going off' means really exciting with a lot of energy.", pts: 600, hint: "Priya says the talent night is going to _______ with Sandra's decorations and the esky." },
      { q: "TRUE or FALSE: A 'larrikin' is a rude and unpleasant person.", a: "FALSE -- A larrikin is fun-loving and cheeky. It's generally a positive word.", pts: 700, hint: "Priya uses it affectionately about the performer who'll laugh if things go wrong." },
      { q: "TRUE or FALSE: 'Heaps' in Australian informal English means a very small amount.", a: "FALSE -- Heaps means a lot or very much.", pts: 800, hint: "Priya says she is _______ excited to veg out for a few days." },
      { q: "TRUE or FALSE: 'Steal the show' means to ruin a performance for everyone else.", a: "FALSE -- It means to be the most impressive or memorable part of an event.", pts: 900, hint: "Marco says whoever does this deserves a prezzy from Sandra's esky." },
      { q: "TRUE or FALSE: 'Prezzy' is Australian slang for a presentation or speech.", a: "FALSE -- Prezzy is Australian slang for a present or a gift.", pts: 1000, hint: "Marco says he'll bring one for Sandra as a thank you for organising everything." },
    ]
  },
];

// ── State ──
let teams = [], scores = [], current = 0;
let used = [], activeQ = null, revealed = false;

// ── Setup ──
function startGame() {
  const raw = [
    document.getElementById('t1').value.trim() || 'Team 1',
    document.getElementById('t2').value.trim() || 'Team 2',
    document.getElementById('t3').value.trim(),
    document.getElementById('t4').value.trim(),
  ];
  teams = raw.filter(n => n.length > 0);
  scores = teams.map(() => 0);
  used = CATS.map(c => c.qs.map(() => false));
  current = 0;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  renderScores();
  renderBoard();
}

// ── Scoreboard ──
function renderScores() {
  const bar = document.getElementById('scoreboard');
  bar.innerHTML = teams.map((t, i) =>
    `<div class="score-card ${i === current ? 'active' : ''}">
      <div class="score-label">${t}</div>
      <div class="score-val">${scores[i].toLocaleString()}</div>
    </div>`
  ).join('');
  document.getElementById('turn-name').textContent = teams[current];
}

// ── Board ──
function renderBoard() {
  const board = document.getElementById('board');
  let html = '';

  CATS.forEach((c, ci) => {
    const col = CAT_COLORS[ci];
    html += `<div class="cat-header" style="background:${col.cell}">${c.name}</div>`;
  });

  const maxQ = Math.max(...CATS.map(c => c.qs.length));
  for (let r = 0; r < maxQ; r++) {
    CATS.forEach((c, ci) => {
      const q = c.qs[r];
      if (!q) { html += `<div></div>`; return; }
      const col = CAT_COLORS[ci];
      if (used[ci][r]) {
        html += `<div class="q-cell used" style="background:${col.cell}">&#10003;</div>`;
      } else {
        html += `<div class="q-cell" style="background:${col.cell}" onclick="openQ(${ci},${r})">${q.pts}</div>`;
      }
    });
  }
  board.innerHTML = html;
}

// ── Modal open ──
function openQ(ci, ri) {
  if (used[ci][ri]) return;
  activeQ = { ci, ri };
  revealed = false;
  const q = CATS[ci].qs[ri];

  document.getElementById('m-pts').textContent = q.pts + ' points';
  document.getElementById('m-cat').textContent = CATS[ci].name;
  document.getElementById('m-q').textContent = q.q;

  const hintEl = document.getElementById('m-hint');
  hintEl.textContent = 'Hint: ' + q.hint;
  hintEl.style.display = 'none';

  const ansEl = document.getElementById('m-ans');
  ansEl.textContent = 'Answer: ' + q.a;
  ansEl.style.display = 'none';

  document.getElementById('m-btns').innerHTML =
    `<button class="btn btn-hint" onclick="showHint()">Hint</button>
     <button class="btn btn-gold" onclick="revealAnswer()">Reveal Answer</button>`;

  document.getElementById('modal-overlay').classList.add('open');
}

function showHint() {
  document.getElementById('m-hint').style.display = 'block';
}

function revealAnswer() {
  if (revealed) return;
  revealed = true;
  document.getElementById('m-ans').style.display = 'block';
  const q = CATS[activeQ.ci].qs[activeQ.ri];
  const teamBtns = teams.map((t, i) =>
    `<button class="btn btn-correct" onclick="award(${i}, ${q.pts})">+${q.pts} to ${t}</button>`
  ).join('');
  document.getElementById('m-btns').innerHTML =
    teamBtns +
    `<button class="btn btn-wrong" onclick="award(-1, 0)">No one got it</button>`;
}

function award(teamIdx, pts) {
  if (teamIdx >= 0) scores[teamIdx] += pts;
  used[activeQ.ci][activeQ.ri] = true;
  current = (current + 1) % teams.length;
  closeModal();
  renderScores();
  renderBoard();
  checkEnd();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  activeQ = null;
  revealed = false;
}

function checkEnd() {
  if (!used.every(row => row.every(v => v))) return;
  document.getElementById('game').style.display = 'none';
  const max = Math.max(...scores);
  document.getElementById('final-scores').innerHTML = teams.map((t, i) =>
    `<div class="final-card ${scores[i] === max ? 'winner' : ''}">
      ${scores[i] === max ? '<div class="fc-crown">🎉</div>' : ''}
      <div class="fc-name">${t}</div>
      <div class="fc-score">${scores[i].toLocaleString()}</div>
    </div>`
  ).join('');
  document.getElementById('endscreen').classList.add('show');
}

function resetGame() {
  document.getElementById('endscreen').classList.remove('show');
  document.getElementById('setup').style.display = 'block';
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
